<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThuleMail</title>
    <script>
      // Применяем тему до отрисовки, чтобы не мигало.
      (function () {
        var t = localStorage.getItem("thulemail-theme") || "light";
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
